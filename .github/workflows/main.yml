name: CI Pipeline

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]
    
permissions:
  pull-requests: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up build environment
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Build project
      run: |
        cd Proj_001
        mkdir -p build
        make all

    - name: Reject merge request if build fails
      if: ${{ failure() }}
      run: gh pr close ${{ github.event.pull_request.number }} --comment "Build failed. Merge request rejected."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Accept merge request if build succeeds
      if: ${{ success() }}
      run: gh pr merge ${{ github.event.pull_request.number }} --auto --merge
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
